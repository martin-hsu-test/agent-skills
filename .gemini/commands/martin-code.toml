description = "End-to-end feature workflow. Phases: plan → code → test → review → report. Default: 1 planner-architect + 1 code-reviewer (fast). Pass -set to choose personas, -y for full 3+3."

prompt = """
The user has invoked /martin-code with the following raw arguments:

```
{{args}}
```

---

## Step 0 — Parse arguments + (optional) interactive selection

### A. Try to parse explicit overrides first

Look for these tokens in the raw args (any order, anywhere):

- **`-set` / `--set`** → force interactive picker (let the user choose personas)
- **`planners=...`** → Phase 1 fan-out width
- **`reviewers=...`** → Phase 3 fan-out width
- **`-y` / `--yes`** → use the FULL roster (3 planners + 3 reviewers), no picker

Allowed values for `planners=` / `reviewers=`:
- A number 1–3
- A comma-separated list of persona names (e.g. `planners=architect,risk`)

Full rosters (used by `-y`):
- Planners: `[planner-architect, planner-pragmatist, planner-risk]`
- Reviewers: `[code-reviewer, security-auditor, test-engineer]`

**FAST DEFAULT** (no flags supplied):
- Planners: `[planner-architect]`
- Reviewers: `[code-reviewer]`
- Skip the picker. Just echo `Plan with [architect] → Code → Test → Review with [code-reviewer]. Feature: <desc>` and start Phase 1 immediately.

Strip the parsed tokens; the remainder is the **feature description**.

### B. If `-set` / `--set` is supplied → INTERACTIVE PICKER

Present a numbered menu and **wait for the user's reply** before proceeding. Do not start Phase 1 until the user has responded.

Example menu to print:

```
我會跑 PLAN → CODE → TEST → REVIEW → REPORT 五階段。

請選擇 Plan 階段要哪幾位規劃師（並行運作，越多視角越廣，但越花時間）：
  1. planner-architect    架構長期視角
  2. planner-pragmatist   務實最小路徑
  3. planner-risk         風險與失敗模式

請選擇 Review 階段要哪幾位審查者：
  4. code-reviewer        五軸程式品質
  5. security-auditor     資安與威脅模型
  6. test-engineer        測試覆蓋率分析

回覆方式（任選其一）：
  • 「全選」或「all」→ 兩階段都用全部 3 個
  • 「1,3 + 4,5」→ planners=architect+risk, reviewers=code-reviewer+security-auditor
  • 「planners=2 reviewers=1」→ 各取前 N 個
  • 「預設」或 Enter → 回到 fast default（architect + code-reviewer）

需要實作的功能描述：<從 args 中解析出的 feature description，若空則請使用者補上>
```

After the user replies, **echo back the parsed config** in one line:
> `Plan with [架構, 風險] → Code → Test → Review with [code-reviewer]. Feature: <description>`

### C. Validation
- If a persona name doesn't exist in `~/.gemini/agents/` or `.gemini/agents/`, fall back to default and warn.
- If feature description is missing or vague, ask **one** clarifying question.

---

## Phase 1 — PLAN (parallel fan-out × N planners)

Spawn the chosen planner personas as subagents **in a single assistant turn so they execute in parallel**. Sequential calls defeat the purpose.

Gemini CLI exposes each `~/.gemini/agents/*.md` as a tool with the same name; user-level definitions take precedence over plugin defaults. If subagents are unavailable in this Gemini CLI version, invoke each persona's system prompt sequentially in the main context and treat the outputs as if returned in parallel.

Constraints (Gemini CLI subagent model):
- Subagents run in isolated context loops and return only their report.
- Personas do not call each other or call skills — they self-contain their methodology.

### Phase 1 synthesis (main agent, not a sub-persona)

After all planner reports return:

1. Lay the plans side-by-side in a comparison table covering: scope, files touched, key trade-offs, risks.
2. Highlight where they **agree** (high-confidence decisions).
3. Highlight where they **disagree** (taste decisions for the user).
4. Propose a **synthesized plan** merging the best of each:
   - Default to the most pragmatic scope unless an architect raises a justified long-term concern
   - Always incorporate any risk planner's mitigations and rollback steps
   - Use the architect's module layout when one is provided
5. **Present the synthesized plan to the user and wait for explicit approval before continuing.** Do not start coding until the user says go.

If only 1 planner was chosen, skip the side-by-side comparison; present that plan directly for approval.

---

## Phase 2 — CODE (sequential, one task at a time)

Once the plan is approved, invoke the `incremental-implementation` and `test-driven-development` skills together.

For each task in the synthesized plan:

1. Read the task's acceptance criteria
2. Load relevant context (existing code, patterns, types)
3. Write a failing test for the expected behavior (RED)
4. Implement the minimum code to pass the test (GREEN)
5. Run that task's tests to confirm green
6. Mark the task complete and move to the next

If any step fails, follow the `debugging-and-error-recovery` skill.

**DO NOT commit anything.** Leave all changes uncommitted in the working tree. The user will review and commit manually after the workflow completes. Do not run `git add`, `git commit`, `git push`, or any state-mutating git command in any phase.

---

## Phase 2.5 — TEST (whole-feature verification)

After all tasks are committed, do an explicit verification pass before review:

1. **Full suite** — run the entire test suite (not just the changed files). Report pass/fail counts and any newly failing tests outside the change.
2. **Build / typecheck** — run the project's build or typecheck. Block on errors.
3. **Coverage delta** — if a coverage tool is configured, report the delta for changed files.
4. **Manual smoke check list** — list the user-visible behaviours to verify by hand (form clicks, CLI invocations, etc.) and ask the user to confirm each, OR invoke `browser-testing-with-devtools` skill if it's a web UI.
5. If anything fails, return to Phase 2 to fix before proceeding to review.

Record the final test snapshot — it goes into the report.

---

## Phase 3 — REVIEW (parallel fan-out × M reviewers)

Spawn the chosen reviewer personas as subagents **in parallel** (same single-turn rule).

### Phase 3 synthesis (main agent)

After all reviewer reports return:

1. Aggregate all **Critical** findings — these are blockers.
2. Aggregate all **Important / High** findings — these are recommended fixes.
3. Resolve duplicates between reviewers.
4. Cross-reference: a finding raised by 2+ personas is escalated.

If only 1 reviewer was chosen, the cross-reference and de-dup steps degenerate naturally; just produce the single report's findings.

---

## Phase 4 — REPORT

Produce a single Markdown file in the **current working directory** named:

`MARTIN-CODE-REPORT-<YYYYMMDD>-<HHMM>.md`

Use the current local date/time. **Never overwrite an existing report** — if a file with the same minute already exists, append `-2`, `-3`, etc.

The file must contain:

```markdown
# /martin-code report — <feature description>

**Generated:** <ISO timestamp>
**Working directory:** <pwd>
**Planners used:** <comma-separated list>
**Reviewers used:** <comma-separated list>

## 1. Plan synthesis
### Plans considered
- <persona>: <1-line summary>
### Agreements (high confidence)
### Disagreements (taste decisions)
### Final plan adopted

## 2. Implementation
### Commits
- <sha> <message>

## 3. Test verification
### Suite result
- Total: <pass>/<fail>
### Build / typecheck
### Coverage delta
### Manual smoke checks confirmed

## 4. Review
### Blockers (Critical)
- [persona] [file:line] [finding + fix]
### Recommended fixes (Important)
### Acknowledged risks

## 5. Verdict
**GO ✅** | **NO-GO ❌**
### Rollback plan
- Trigger conditions:
- Rollback procedure:

## Appendix — full reports
<one section per persona used in Phase 1 and Phase 3>
```

After writing the file, print the file path back to the user followed by a 5-line TL;DR.

---

## Rules

1. Phase 1 and Phase 3 personas run in **parallel** — never sequentially when subagents are available.
2. Personas do not call each other. The main agent merges in synthesis steps.
3. **Stop and wait for user approval after the picker (Step 0) AND after the synthesized plan (Phase 1).** Do not silently proceed.
4. **NEVER commit, push, or run any state-mutating git command.** Leave changes uncommitted; the user commits manually.
5. **Phase 2.5 is mandatory** — do not skip to review without running the full suite + build.
6. The final report is written to the **current working directory**, with a timestamped filename, never overwriting prior reports.
7. If any Phase 3 persona returns a Critical finding, the default verdict is **NO-GO** unless the user explicitly accepts the risk.
8. If the user supplies persona names that do not exist, fall back to the default roster and warn them.
"""
